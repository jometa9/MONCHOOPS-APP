name: Build MonchoOps (Mac + Windows)

on:
  push:
    branches:
      - free-version
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch and tag
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          git add package.json package-lock.json 2>/dev/null || git add package.json
          git commit -m "chore: release $TAG [skip ci]"
          git tag "$TAG"
          git push origin HEAD:free-version
          git push origin "$TAG"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-mac:
    needs: bump
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Mac (unsigned)
        env:
          SKIP_MAC_SIGNING: 'true'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:mac

      - name: Build Chrome extension
        run: npm run build:extension

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monchoops-mac
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: warn

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: monchoops-chrome-extension
          path: |
            release/MonchoOps-Extension-*.zip
            chrome-extension/*.zip
          if-no-files-found: warn

  build-windows:
    needs: bump
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: monchoops-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: warn

  release:
    needs: [bump, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: monchoops-mac
          path: dist-artifacts/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: monchoops-windows
          path: dist-artifacts/windows

      - name: Download Chrome extension artifact
        uses: actions/download-artifact@v4
        with:
          name: monchoops-chrome-extension
          path: dist-artifacts/chrome-extension

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: MonchoOps ${{ needs.bump.outputs.tag }}
          generate_release_notes: true
          files: |
            dist-artifacts/mac/*
            dist-artifacts/windows/*
            dist-artifacts/chrome-extension/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
